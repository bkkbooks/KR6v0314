body:
  text: 民國丘寶光徐鄂雲同譯一時佛率領徒衆至羯臘摩人所居鄉村此方人民久聞佛陀巍德聖潔智慧無邊爾時村民集合虔誠敬禮而白佛言世尊外道與婆羅門徒多番頻來闡釋所宗自炫互謗各用其極我等迷亂莫辨是非今我村民得聞聖教惟願佛陀慈悲開示脫離迷津認知真理不勝馨禱佛言善哉當為汝說事理有疑則當疑之人云至善或云至惡毋得輕信更勿以為誠若非真當無斷言以此自解誤為真理縱屬傳統代代沿襲多方流行亦難憑信復次任何傳說不可輕信衆口鑠金非足徵實復次書籍文稿著述校注謂出先賢投誠服膺奇思異說引人幻想疑作神怪天機策劃毋為輕信毋受眩惑復次凡百事物勿從臆度事逢偶然未知演變執始為終擅作論斷一事未決妄談二三比論類推因應萬千見器範水信世有垣樹影婆娑彌樓山在市舍人構衆生神造諸如此類俱不足信復次毋持偏見自傲風習衣服妝飾語言文物俱成國粹遠勝他國復次毋憑直覺遽信其人如爾所見貌相動人斷為智巧且堪倚憑如爾所見有勢有能冠絶羣倫所言俱信或自忖度偌大貴人應寄信仰若非至賢王不眷恩陟此高位復次爾等勿因師長權威己所尊崇所信所行定必正確我亦信之我自行之我告爾等當自思量此是惡事必受業報智者不齒信之無益且貽後患爾等明此應即拼除爾等村民答我所問羅巴為貪是即貪欲多撒為瞋忿怨殘酷謨哈為癡無知妄念或有一念或兼三者發於人心量其結果有益與否村民共答噫嘻世尊是皆無益佛陀續問貪瞋癡人殺盜淫妄唆使他人效而從之非如是乎村民共答世尊所言誠屬如此佛陀續問貪瞋癡念殺盜淫妄是善是惡是正是邪智者讚許抑為不齒三者無益且貽禍否村民共答誠如世尊開示甚明於是佛言本此一理今我宣說勿即信受爾等有聞須自識別知有不善應即捨棄爾時佛陀開示正道若人自知任何一事是善非惡智者讚賞裨益滋多樂利所生當知信願努力多行我今再問一阿羅巴二阿多撒三阿謨哈去貪瞋癡為有益否衆答有益佛陀再問不貪之人不瞋之人不癡之人不行殘殺不為盜竊不犯淫妄不說謊言是耶否耶衆答盡如佛言佛陀再問去貪瞋癡殺盜淫妄是善是惡是正是邪智者譴責抑有褒揚有益無益致殃致祥衆答是善是正智者褒揚饒益衆生接福迎祥於是佛言我今宣說爾等共聞勿即信受一旦起信須由自覺發心受持奉行不怠最後佛言聖者三戒勿貪勿仇勿為愚妄曉暢實踐四無量心即四梵柱彌塔為慈願彼衆生同享幸樂各如所求迦盧那悲肄心同情願彼衆生或在地獄或在他道免除百慮如見至友有病立愈睦諦塔喜與彼衆生相互樂處如結游侶游比卡捨持心公允不偏不私衆生平等
